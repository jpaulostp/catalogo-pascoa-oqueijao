<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="description" content="Catálogo de Páscoa - O Queijão | Ovos de colher artesanais em São Pedro da Aldeia">
<meta name="theme-color" content="#2C1810">
<title>Páscoa 2026 | O Queijão</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#FAF6F0;font-family:'Segoe UI',-apple-system,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:480px;margin:0 auto;min-height:100vh;position:relative}
.ff{font-family:'Playfair Display',Georgia,serif}

/* Header */
.hdr{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#2C1810,#3E2419);padding:8px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #DAA520}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr-logo{width:48px;height:48px;object-fit:contain}
.hdr-name{font-family:‘Playfair Display’,Georgia,serif;font-size:15px;font-weight:700;color:#FFD700;letter-spacing:1px}
.hdr-sub{font-size:9px;color:#DAA520;letter-spacing:2px;text-transform:uppercase}
.cart-btn{background:rgba(218,165,32,0.15);border:1px solid #DAA520;border-radius:24px;padding:8px 16px;display:flex;align-items:center;gap:8px;cursor:pointer;color:#DAA520;font-weight:700;font-size:14px;transition:all .3s}
.cart-btn.active{background:#DAA520;color:#2C1810}
.cart-badge{background:#2C1810;color:#FFD700;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800}

/* Hero */
.hero{background:linear-gradient(180deg,#2C1810,#4A2C1A 50%,#3E2419);padding:40px 20px 36px;text-align:center;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;opacity:.06;background-image:radial-gradient(circle at 20% 30%,#FFD700 1px,transparent 1px),radial-gradient(circle at 80% 70%,#FFD700 1px,transparent 1px);background-size:60px 60px,80px 80px}
.hero-content{position:relative;z-index:1}
.hero-sub{font-size:11px;letter-spacing:6px;color:#DAA520;text-transform:uppercase;margin-bottom:12px}
.hero h1{font-family:‘Playfair Display’,Georgia,serif;font-size:52px;font-weight:900;color:#FFF8DC;margin:0 0 8px;line-height:1}
.hero-year{font-family:‘Playfair Display’,Georgia,serif;font-size:20px;color:#DAA520;font-style:italic;margin-bottom:20px}
.hero-dots{display:flex;justify-content:center;gap:6px;margin-bottom:20px}
.hero-dot{height:2px;border-radius:1px;background:rgba(218,165,32,.3)}
.hero-dot.mid{width:32px;background:#DAA520}
.hero p{color:rgba(255,248,220,.7);font-size:14px;max-width:300px;margin:0 auto;line-height:1.6}

/* Notice */
.notice{background:rgba(218,165,32,.08);border-radius:12px;padding:10px 14px;font-size:13px;color:#8B6914;text-align:center;line-height:1.5;font-weight:500;margin:20px 16px 8px}

/* Info grid */
.info{background:linear-gradient(135deg,#2C1810,#3E2419);padding:20px;margin:16px;border-radius:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.info-item{background:rgba(255,248,220,.06);border-radius:12px;padding:12px;text-align:center}
.info-icon{font-size:22px;margin-bottom:4px}
.info-label{font-size:13px;font-weight:700;color:#FFD700}
.info-sub{font-size:11px;color:rgba(255,248,220,.5)}

/* Section */
.sec{padding:8px 16px}
.sec-title{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sec-bar{width:4px;height:28px;border-radius:2px;background:linear-gradient(180deg,#DAA520,#8B6914)}
.sec-title h2{font-family:‘Playfair Display’,Georgia,serif;font-size:24px;font-weight:700;color:#2C1810;margin:0}
.sec.esp{padding-top:24px}
.sec.monte{padding:8px 16px 32px}

/* Product card */
.card{background:#FFF;border-radius:20px;overflow:hidden;box-shadow:0 4px 20px rgba(44,24,16,.08);border:1px solid rgba(218,165,32,.15);margin-bottom:16px}
.card-top{padding:20px 18px 14px;display:flex;gap:14px;align-items:flex-start}
.card-img{width:100px;height:120px;object-fit:contain;flex-shrink:0;border-radius:12px}
.card-emoji{width:100px;height:120px;display:flex;align-items:center;justify-content:center;font-size:48px;flex-shrink:0}
.card-info{flex:1;min-width:0}
.card-info h3{font-family:‘Playfair Display’,Georgia,serif;font-size:19px;font-weight:700;color:#2C1810;margin:0 0 6px;line-height:1.2}
.card-weight{display:inline-block;background:rgba(218,165,32,.1);border-radius:8px;padding:2px 10px;font-size:12px;color:#8B6914;font-weight:600;margin-bottom:6px}
.card-info p{font-size:13px;color:#6B5B4E;line-height:1.5;margin:0}
.card-bottom{display:flex;align-items:center;justify-content:flex-end;padding:12px 18px;border-top:1px solid rgba(218,165,32,.1);background:rgba(255,248,220,.3)}
.add-btn{background:linear-gradient(135deg,#DAA520,#B8860B);border:none;border-radius:14px;padding:10px 18px;color:#FFF;font-weight:700;font-size:13px;cursor:pointer;box-shadow:0 3px 12px rgba(218,165,32,.3);transition:all .3s}
.add-btn.ok{background:#2E7D32}

/* Builder */
.builder{background:linear-gradient(180deg,#FFF8DC,#FFFEF7);border-radius:20px;border:2px solid #DAA520;overflow:hidden}
.builder-hdr{background:linear-gradient(135deg,#2C1810,#3E2419);padding:20px;text-align:center}
.builder-hdr h3{font-family:‘Playfair Display’,Georgia,serif;font-size:24px;font-weight:700;color:#FFD700;margin:0}
.builder-hdr p{color:rgba(255,248,220,.6);font-size:12px;margin:6px 0 0}
.builder-body{padding:20px;display:flex;flex-direction:column;gap:20px}
.builder-label{font-weight:700;font-size:14px;color:#2C1810;margin-bottom:10px;display:block}
.builder-label span{font-weight:400;color:#8B6914}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:rgba(218,165,32,.08);border:1.5px solid rgba(218,165,32,.25);border-radius:10px;padding:8px 14px;font-size:13px;color:#5C3317;font-weight:500;cursor:pointer;transition:all .2s}
.chip.on{background:#DAA520;border-color:#DAA520;color:#FFF;font-weight:700}
.builder-submit{background:linear-gradient(135deg,#DAA520,#B8860B);border:none;border-radius:14px;padding:14px;color:#FFF;font-weight:700;font-size:15px;cursor:pointer}
.builder-submit:disabled{background:#CCC;cursor:default}
.builder-submit.ok{background:#2E7D32}

/* Cart drawer */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:200}
.drawer{position:fixed;bottom:0;left:0;right:0;z-index:201;background:#FFF;border-radius:24px 24px 0 0;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.2)}
.drawer-hdr{padding:20px 20px 16px;border-bottom:1px solid rgba(218,165,32,.15);display:flex;align-items:center;justify-content:space-between}
.drawer-hdr h2{font-family:‘Playfair Display’,Georgia,serif;font-size:22px;font-weight:700;color:#2C1810;margin:0}
.close-btn{background:rgba(44,24,16,.06);border:none;border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;color:#6B5B4E}
.drawer-body{flex:1;overflow-y:auto;padding:20px}
.empty{text-align:center;padding:40px 0;color:#8B7B6E}
.empty-icon{font-size:48px;margin-bottom:12px}
.cart-item{display:flex;align-items:center;gap:12px;padding:14px;background:rgba(255,248,220,.4);border-radius:14px;border:1px solid rgba(218,165,32,.1);margin-bottom:12px}
.cart-item-info{flex:1;min-width:0}
.cart-item-name{font-weight:700;font-size:15px;color:#2C1810;margin-bottom:2px}
.cart-item-desc{font-size:11px;color:#8B6914;line-height:1.4}
.qty-controls{display:flex;align-items:center;gap:8px}
.qty-btn{width:30px;height:30px;border-radius:8px;border:1px solid rgba(218,165,32,.3);background:#FFF;cursor:pointer;font-size:16px;color:#5C3317;display:flex;align-items:center;justify-content:center}
.qty-num{font-weight:700;font-size:16px;color:#2C1810;min-width:20px;text-align:center}
.rm-btn{background:none;border:none;font-size:18px;cursor:pointer;color:#C0392B;padding:4px}
.drawer-footer{padding:16px 20px 24px;border-top:1px solid rgba(218,165,32,.15);background:#FFFEF7}
.drawer-info{background:rgba(218,165,32,.08);border-radius:12px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#8B6914;line-height:1.5}
.wa-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:#25D366;color:#FFF;border-radius:16px;padding:16px;font-weight:700;font-size:16px;text-decoration:none;box-shadow:0 4px 16px rgba(37,211,102,.3)}

/* Floating button */
.float-btn{position:fixed;bottom:20px;left:16px;right:16px;z-index:150;background:linear-gradient(135deg,#25D366,#128C7E);border:none;border-radius:18px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;box-shadow:0 8px 32px rgba(37,211,102,.4);color:#FFF}
.float-left{display:flex;align-items:center;gap:10px}
.float-badge{background:rgba(255,255,255,.2);border-radius:10px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800}

/* Footer */
.foot{background:linear-gradient(135deg,#2C1810,#3E2419);padding:28px 20px;text-align:center}
.foot-logo{width:120px;height:120px;object-fit:contain;margin:0 auto 12px;display:block}
.foot-sub{font-size:11px;color:rgba(255,248,220,.5)}
</style>

</head>

{id:1,name:"Brigadeiro",desc:"Ovo de colher com casca de chocolate blend (ao leite e meio amargo), recheado com muito brigadeiro cremoso de panela.",w:"350g",cat:"colher",img:"https://i.ibb.co/5hxnSxJh/Untitled-design-6.png"},
{id:2,name:"Brigadeiro com Caramelo Toffee",desc:"Ovo de colher com casca de chocolate blend recheado com brigadeiro cremoso, Nutella e ganache de caramelo toffee.",w:"350g",cat:"colher",img:"https://i.ibb.co/xSCgFWHj/Untitled-design-1.png"},
{id:3,name:"Ninho com Nutella",desc:"Ovo de colher com casca de chocolate blend recheado com brigadeiro cremoso de ninho e muita Nutella.",w:"350g",cat:"colher",img:"https://i.ibb.co/GvsV2769/Untitled-design-2.png"},
{id:4,name:"Ninho com Geleia de Morango",desc:"Ovo de colher com casca de chocolate branco recheado com brigadeiro cremoso de ninho e geleia de morango caseira.",w:"350g",cat:"colher",img:"https://i.ibb.co/xdWM1Vd/Untitled-design-5.png"},
{id:5,name:"Oreo com Nutella",desc:"Ovo de colher com casca de chocolate branco com pedaços de biscoito Oreo, recheado com brigadeiro cremoso de Oreo e muita Nutella.",w:"350g",cat:"colher",img:"https://i.ibb.co/wZYjRjKr/Untitled-design-4.png"},
{id:6,name:"Trio Mini",desc:"3 ovinhos de 150g cada. 1- Casca Branca: Ninho com Geleia de Morango. 2- Casca Oreo: Ninho com Nutella. 3- Casca Meio Amargo: Brigadeiro cremoso.",w:"150g cada",cat:"trio",img:"https://i.ibb.co/Tq8ZyRpf/Untitled-design-3.png"},
{id:7,name:"Kit Confeiteiro",desc:"Casca de 150g, uma bisnaga com recheio (ninho ou brigadeiro) e dois confeitos à escolha: granulado colorido, preto ou branco.",w:"150g",cat:"kit",img:null},
];

const customOpts={
casca:["Ao leite","Meio amargo","Branco","Negresco"],
tradi:["Brigadeiro","Beijinho","Prestígio","Paçoca"],
gourm:["Oreo","Ninho","Geleia de morango","Nutella","Red Velvet"],
adic:["Morango","Kinder Bueno","KitKat","Ferrero Rocher","Kinder Ovo"]
};

let cart=[];
let builderState={casca:"",recheio:"",adicionais:[]};

function render(){
const app=document.getElementById('app');
const tot=cart.reduce((s,i)=>s+i.qty,0);
app.innerHTML=`
${renderHeader(tot)}
${renderHero()}
<div class="notice">💰 Preços disponíveis através do nosso delivery</div>
${renderInfo()}
<div class="sec">
  <div class="sec-title"><div class="sec-bar"></div><h2>Ovos de Colher</h2></div>
  ${products.filter(p=>p.cat==="colher").map(renderCard).join('')}
</div>
<div class="sec esp">
  <div class="sec-title"><div class="sec-bar"></div><h2>Especiais</h2></div>
  ${products.filter(p=>p.cat!=="colher").map(renderCard).join('')}
</div>
<div class="sec monte">
  <div class="sec-title"><div class="sec-bar"></div><h2>Monte o Seu</h2></div>
  ${renderBuilder()}
</div>
<footer class="foot">
  <img src="${LOGO}" alt="O Queijão" class="foot-logo">
  <div class="foot-sub">São Pedro da Aldeia</div>
</footer>
${tot>0?renderFloatBtn(tot):''}
`;
app.style.paddingBottom=tot>0?'80px':'0';
}

function renderHeader(tot){
return`<header class="hdr">
<div class="hdr-left">
  <img src="${LOGO}" alt="O Queijão" class="hdr-logo">
  <div><div class="hdr-name">O QUEIJÃO</div><div class="hdr-sub">São Pedro da Aldeia</div></div>
</div>
<button class="cart-btn ${tot>0?'active':''}" onclick="openCart()">🛒${tot>0?`<span class="cart-badge">${tot}</span>`:''}</button>
</header>`;
}

function renderHero(){
return`<section class="hero">
<div class="hero-bg"></div>
<div class="hero-content">
  <div class="hero-sub">Catálogo de</div>
  <h1 class="ff">Páscoa</h1>
  <div class="hero-year">2026</div>
  <div class="hero-dots"><div class="hero-dot" style="width:6px"></div><div class="hero-dot" style="width:6px"></div><div class="hero-dot mid"></div><div class="hero-dot" style="width:6px"></div><div class="hero-dot" style="width:6px"></div></div>
  <p>Ovos de colher artesanais feitos com muito carinho. Faça sua encomenda!</p>
</div>
</section>`;
}

function renderInfo(){
const items=[
{i:"📦",l:"Retirada",s:"Na loja física"},
{i:"🛵",l:"Delivery",s:"9h às 21h"},
{i:"💰",l:"Encomendas",s:"Pelo WhatsApp"},
{i:"📱",l:"WhatsApp",s:"(22) 99868-0403"}
];
return`<div class="info">${items.map(x=>`<div class="info-item"><div class="info-icon">${x.i}</div><div class="info-label">${x.l}</div><div class="info-sub">${x.s}</div></div>`).join('')}</div>`;
}

function renderCard(p){
const imgHtml=p.img?`<img src="${p.img}" alt="${p.name}" class="card-img">`:`<div class="card-emoji">👨‍🍳</div>`;
return`<div class="card">
<div class="card-top">${imgHtml}<div class="card-info"><h3>${p.name}</h3><div class="card-weight">${p.w}</div><p>${p.desc}</p></div></div>
<div class="card-bottom"><button class="add-btn" onclick="addToCart(${p.id})">＋ Adicionar</button></div>
</div>`;
}

function renderBuilder(){
const{casca,recheio,adicionais}=builderState;
function chips(opts,sel,fn,multi){
return`<div class="chips">${opts.map(o=>{
const on=multi?adicionais.includes(o):sel===o;
return`<button class="chip ${on?'on':''}" onclick="${fn}('${o}')">${o}</button>`;
}).join('')}</div>`;
}
const canAdd=casca&&recheio;
return`<div class="builder">
<div class="builder-hdr"><div style="font-size:28px;margin-bottom:8px">🎨</div><h3>Monte o Seu Ovo</h3><p>Solicite o orçamento pelo WhatsApp</p></div>
<div class="builder-body">
<div><label class="builder-label">Sabor da Casca</label>${chips(customOpts.casca,casca,'setCasca')}</div>
<div><label class="builder-label">Recheio Tradicional</label>${chips(customOpts.tradi,recheio,'setRecheio')}</div>
<div><label class="builder-label">Recheio Gourmet</label>${chips(customOpts.gourm,recheio,'setRecheio')}</div>
<div><label class="builder-label">Adicionais <span>(opcional)</span></label>${chips(customOpts.adic,'','toggleAdic',true)}</div>
<button class="builder-submit" ${canAdd?'':'disabled'} onclick="addCustom()">${canAdd?'Adicionar ao Pedido':'Adicionar ao Pedido'}</button>
</div></div>`;
}

function renderFloatBtn(tot){
return`<button class="float-btn" onclick="openCart()">
<div class="float-left"><div class="float-badge">${tot}</div><span style="font-weight:700;font-size:15px">Ver Pedido</span></div>
<span style="font-weight:700;font-size:15px">Enviar no WhatsApp →</span>
</button>`;
}

function addToCart(id){
const p=products.find(x=>x.id===id);
const ex=cart.findIndex(x=>x.id===id&&!x.isCustom);
if(ex>=0){cart[ex].qty++}else{cart.push({...p,qty:1})}
const btn=event.target;btn.textContent="✓ Adicionado";btn.classList.add('ok');
setTimeout(()=>{btn.textContent="＋ Adicionar";btn.classList.remove('ok')},1200);
render();
}

function setCasca(v){builderState.casca=v;render();window.scrollTo(0,document.body.scrollHeight-800)}
function setRecheio(v){builderState.recheio=v;render();window.scrollTo(0,document.body.scrollHeight-600)}
function toggleAdic(v){
const a=builderState.adicionais;
const i=a.indexOf(v);
if(i>=0)a.splice(i,1);else a.push(v);
render();window.scrollTo(0,document.body.scrollHeight-400);
}

function addCustom(){
const{casca,recheio,adicionais}=builderState;
if(!casca||!recheio)return;
const desc=`Casca: ${casca}. Recheio: ${recheio}.${adicionais.length?' Adicionais: '+adicionais.join(', ')+'.':''}`;
cart.push({id:'c-'+Date.now(),name:"Ovo Personalizado",desc,w:"350g",isCustom:true,qty:1});
builderState={casca:"",recheio:"",adicionais:[]};
render();
}

function openCart(){
const ov=document.createElement('div');ov.className='overlay';ov.id='cart-overlay';ov.onclick=closeCart;
const d=document.createElement('div');d.className='drawer';d.id='cart-drawer';
d.innerHTML=`
<div class="drawer-hdr"><h2 class="ff">Seu Pedido</h2><button class="close-btn" onclick="closeCart()">✕</button></div>
<div class="drawer-body">
${cart.length===0?'<div class="empty"><div class="empty-icon">🥚</div><p>Seu pedido está vazio</p></div>':
cart.map((it,i)=>`<div class="cart-item">
<div class="cart-item-info"><div class="cart-item-name">${it.name}</div>${it.isCustom?`<div class="cart-item-desc">${it.desc}</div>`:''}</div>
<div class="qty-controls">
<button class="qty-btn" onclick="event.stopPropagation();changeQty(${i},-1)">−</button>
<span class="qty-num">${it.qty}</span>
<button class="qty-btn" onclick="event.stopPropagation();changeQty(${i},1)">+</button>
</div>
<button class="rm-btn" onclick="event.stopPropagation();removeItem(${i})">🗑</button>
</div>`).join('')}
</div>
${cart.length>0?`<div class="drawer-footer">
<div class="drawer-info">💰 Preços disponíveis pelo nosso delivery<br>📋 Sinal de 50% na loja ou por Pix<br>💳 Chave CNPJ: 48.288.550/0001-84<br>🕘 Delivery: 9h às 21h</div>
<a href="https://wa.me/${WA}?text=${buildMsg()}" target="_blank" rel="noopener noreferrer" class="wa-btn">
<svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
Enviar Pedido no WhatsApp</a>
</div>`:''}`;
document.body.appendChild(ov);document.body.appendChild(d);
}

function closeCart(){
const ov=document.getElementById('cart-overlay');
const d=document.getElementById('cart-drawer');
if(ov)ov.remove();if(d)d.remove();
render();
}

function changeQty(i,d){cart[i].qty=Math.max(1,cart[i].qty+d);closeCart();openCart();}
function removeItem(i){cart.splice(i,1);closeCart();if(cart.length>0)openCart();render();}

function buildMsg(){
let m="🐰 *Pedido de Páscoa - O Queijão*\n\n";
cart.forEach((it,i)=>{m+=`${i+1}. *${it.name}*`;if(it.isCustom)m+=`\n   ${it.desc}`;m+=`\n   Qtd: ${it.qty}\n\n`;});
m+="Gostaria de saber os preços, prazo e confirmar o pedido! 🙏";
return encodeURIComponent(m);
}

render();
</script>

</body>
</html>
